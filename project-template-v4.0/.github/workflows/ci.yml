# ============================================================
# CI Pipeline — [專案名稱]
# AI-First Framework — G4-ENG-01 要求「CI Pipeline 10 階段全綠」
#
# 10 個必須通過的 Stage（對應 G4-ENG-01 驗收清單）：
#   Stage 1  — Lint（程式碼風格）
#   Stage 2  — Build（編譯/打包）
#   Stage 3  — Unit Test（單元測試，覆蓋率 ≥ 80%）
#   Stage 4  — Integration Test（整合測試）
#   Stage 5  — Contract Validation（ENUM + Schema Drift Detection）
#   Stage 6  — OWASP Dependency Check（已知 CVE）
#   Stage 7  — SonarQube / Code Quality Gate
#   Stage 8  — Security Scan（Secret 掃描）
#   Stage 9  — Docker Build（容器化）
#   Stage 10 — Smoke Test（部署後冒煙測試）
#
# 使用前替換：
#   [REGISTRY]     → Docker registry（e.g. ghcr.io/org）
#   [IMAGE_NAME]   → Docker image name
#   [SONAR_URL]    → SonarQube server URL（若不用可刪除 Stage 7）
# ============================================================

name: CI Pipeline

on:
  push:
    branches: [main, develop, "feature/**", "hotfix/**"]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: "20"
  JAVA_VERSION: "21"

jobs:
  # ── Stage 1: Lint ──────────────────────────────────────────
  lint:
    name: "Stage 1 — Lint"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Frontend lint (adjust for your framework)
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        run: cd frontend && npm ci

      - name: Frontend Lint
        run: cd frontend && npm run lint

      # Backend lint (adjust for your language/framework)
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin

      - name: Backend Lint (Checkstyle)
        run: cd backend && ./mvnw checkstyle:check -q

  # ── Stage 2: Build ─────────────────────────────────────────
  build:
    name: "Stage 2 — Build"
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Frontend Build
        run: cd frontend && npm ci && npm run build

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Backend Build
        run: cd backend && ./mvnw package -DskipTests -q

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            frontend/dist/
            backend/target/*.jar

  # ── Stage 3: Unit Test ─────────────────────────────────────
  unit-test:
    name: "Stage 3 — Unit Test (≥80% coverage)"
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Frontend Unit Tests (Istanbul)
        run: |
          cd frontend && npm ci
          npm run test:coverage
          # G4-ENG-03: FE Composable ≥ 80% coverage
          npx istanbul check-coverage --lines 80 --functions 80 --branches 80

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Backend Unit Tests (JaCoCo)
        run: |
          cd backend
          ./mvnw test jacoco:report -q
          # G4-ENG-02: BE Service layer ≥ 80% coverage
          ./mvnw jacoco:check -Djacoco.minimum.coverage=0.80 -q

  # ── Stage 4: Integration Test ──────────────────────────────
  integration-test:
    name: "Stage 4 — Integration Test"
    runs-on: ubuntu-latest
    needs: unit-test
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: testdb
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Run Integration Tests
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: testdb
          DB_USER: test
          DB_PASSWORD: test
        run: cd backend && ./mvnw verify -P integration-tests -q

  # ── Stage 5: Contract Validation ───────────────────────────
  contract-validation:
    name: "Stage 5 — Contract Validation (DC-04, DC-05, DC-06)"
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      # DC-06: ENUM consistency (Java Enum = TS Union = DB CHECK = YAML)
      - name: ENUM Consistency Check
        run: |
          echo "Checking ENUM consistency across layers..."
          # TODO: Replace with your actual ENUM validation script
          # node scripts/validate-enums.js
          echo "⚠️  Add your ENUM validation script here (DC-06)"

      # DC-04: Schema Drift Detection
      - name: Schema Drift Detection
        run: |
          echo "Checking for schema drift..."
          # TODO: Replace with your actual drift detection (e.g. liquibase diff)
          # cd backend && ./mvnw liquibase:diff
          echo "⚠️  Add your schema drift detection here (DC-04)"

      # DC-05: VO field count ≤ API Spec response fields
      - name: API Contract Validation
        run: |
          echo "Validating API contract (VO ≤ API Spec fields)..."
          # TODO: Replace with your API contract validation
          echo "⚠️  Add your API contract validation here (DC-05)"

  # ── Stage 6: OWASP Dependency Check ───────────────────────
  security-deps:
    name: "Stage 6 — OWASP Dependency Check"
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: OWASP Dependency Check
        run: |
          cd backend
          ./mvnw org.owasp:dependency-check-maven:check \
            -DfailBuildOnCVSS=7 \
            -DsuppressionsLocation=owasp-suppressions.xml \
            -q
        # G4-ENG-04: No Critical security vulnerabilities

      - name: Frontend Audit
        run: cd frontend && npm audit --audit-level=high

  # ── Stage 7: Code Quality (SonarQube) ─────────────────────
  code-quality:
    name: "Stage 7 — SonarQube Quality Gate"
    runs-on: ubuntu-latest
    needs: unit-test
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for SonarQube blame

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: SonarQube Scan
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        run: |
          cd backend
          ./mvnw sonar:sonar \
            -Dsonar.projectKey=[專案名稱] \
            -Dsonar.qualitygate.wait=true \
            -q
        # G4-ENG-04: SonarQube Quality Gate must pass

  # ── Stage 8: Secret Scan ───────────────────────────────────
  secret-scan:
    name: "Stage 8 — Secret Scan"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan for secrets (Gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # D16-D20: 密鑰未進 Git

  # ── Stage 9: Docker Build ──────────────────────────────────
  docker-build:
    name: "Stage 9 — Docker Build"
    runs-on: ubuntu-latest
    needs: [unit-test, security-deps, secret-scan]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    steps:
      - uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts

      - name: Build Docker image
        run: |
          docker build -t [REGISTRY]/[IMAGE_NAME]:${{ github.sha }} .
          docker build -t [REGISTRY]/[IMAGE_NAME]:latest .

      - name: Log in to registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push Docker image
        run: |
          docker push [REGISTRY]/[IMAGE_NAME]:${{ github.sha }}
          docker push [REGISTRY]/[IMAGE_NAME]:latest

  # ── Stage 10: Smoke Test ───────────────────────────────────
  smoke-test:
    name: "Stage 10 — Smoke Test"
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    steps:
      - uses: actions/checkout@v4

      - name: Start service
        run: |
          docker pull [REGISTRY]/[IMAGE_NAME]:${{ github.sha }}
          docker run -d --name smoke-test-app \
            -p 8080:8080 \
            -e APP_ENV=staging \
            [REGISTRY]/[IMAGE_NAME]:${{ github.sha }}
          sleep 10

      - name: Run smoke tests
        run: |
          # Health check
          curl -f http://localhost:8080/actuator/health || exit 1
          echo "✅ Health check passed"

          # TODO: Add your smoke test suite here
          # npx playwright test --project=smoke

      - name: Cleanup
        if: always()
        run: docker stop smoke-test-app && docker rm smoke-test-app
