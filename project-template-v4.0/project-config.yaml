# ============================================================
# V4 Project Configuration
# ============================================================
# 本檔案是專案級設定的 Single Source of Truth。
# Task-Master 啟動時讀取此檔，決定 Agent 載入哪些 skill。
# 修改此檔不需要 CIA（它本身不是 artifact，是 infra config）。
# ============================================================

project:
  name: "[專案名稱]"
  type: "[SaaS B2B / SaaS B2C / 內部系統 / API 平台]"
  tech_stack: "[Vue 3 / Spring Boot / MySQL + MSSQL / GCP]"
  created: "[YYYY-MM-DD]"

# ---- Domain Skill ----
domain:
  name: "[domain-name]"                          # 例: call-center
  skill_path: "context-skills/[domain-name]"     # Domain Skill 目錄
  load_for:
    - Interviewer
    - PM
    - UX
    - Architect
    - DBA
    - Backend
    - Frontend
    - QA
    - Review
  exclude:
    - Task-Master    # 純 dispatcher，不需業務知識
    - DevOps         # 純基礎設施
    - Security       # 通用安全（合規類 domain 可移入 load_for）

# ---- Agent × Skill Matrix ----
# 每個 Agent 啟動時自動載入的 skill。
# Task-Master 根據此表組裝 context。
agents:
  Task-Master:
    group: null
    role_file: null
    required_skills:
      - task-master
      - verification-before-completion
    optional_skills: []
    context_files:
      - memory/STATE.md
      - TASKS.md

  Interviewer:
    group: Discovery
    role_file: context-roles/GROUP_Discovery.md
    required_skills:
      - brainstorming
      - writing-plans
      - planning-with-tasks
      - verification-before-completion
    optional_skills:
      - deep-research
      - doc-coauthoring
    context_files:
      - context-roles/GROUP_Discovery.md

  PM:
    group: Discovery
    role_file: context-roles/GROUP_Discovery.md
    required_skills:
      - writing-plans
      - planning-with-tasks
      - verification-before-completion
    optional_skills:
      - deep-research
      - doc-coauthoring
    context_files:
      - context-roles/GROUP_Discovery.md

  UX:
    group: Discovery
    role_file: context-roles/GROUP_Discovery.md
    required_skills:
      - brainstorming
      - frontend-design
      - planning-with-tasks
      - verification-before-completion
    optional_skills:
      - screenshot-to-code
    context_files:
      - context-roles/GROUP_Discovery.md
      - DESIGN.md

  Architect:
    group: Discovery
    role_file: context-roles/GROUP_Discovery.md
    required_skills:
      - writing-plans
      - deep-research
      - planning-with-tasks
      - verification-before-completion
    optional_skills: []
    context_files:
      - context-roles/GROUP_Discovery.md

  Backend:
    group: Build
    role_file: context-roles/GROUP_Build.md
    required_skills:
      - writing-plans
      - test-driven-development
      - self-healing-build           # v4.1: TDD GREEN 失敗時自動修復
      - systematic-debugging
      - pattern-library              # v4.1: Build 前查/後回饋 pattern
      - validate-contract            # v4.1: 升級 Tier 1，Contract 雙向驗證
      - planning-with-tasks
      - using-git-worktrees
      - requesting-code-review
      - verification-before-completion
    optional_skills:
      - ground
      - external-integration        # 串接外部 SDK/API/WS 時載入
    context_files:
      - context-roles/GROUP_Build.md

  Frontend:
    group: Build
    role_file: context-roles/GROUP_Build.md
    required_skills:
      - writing-plans
      - test-driven-development
      - self-healing-build           # v4.1: TDD GREEN 失敗時自動修復
      - systematic-debugging
      - pattern-library              # v4.1: Build 前查/後回饋 pattern
      - validate-contract            # v4.1: 升級 Tier 1，Contract 雙向驗證
      - frontend-design
      - planning-with-tasks
      - using-git-worktrees
      - requesting-code-review
      - verification-before-completion
    optional_skills:
      - ground
      - screenshot-to-code
      - external-integration        # 串接外部 SDK/API/WS 時載入
    context_files:
      - context-roles/GROUP_Build.md
      - DESIGN.md

  DBA:
    group: Build
    role_file: context-roles/GROUP_Build.md
    required_skills:
      - writing-plans
      - planning-with-tasks
      - verification-before-completion
    optional_skills:
      - ground
      - validate-contract
    context_files:
      - context-roles/GROUP_Build.md

  QA:
    group: Verify
    role_file: context-roles/GROUP_Verify.md
    required_skills:
      - webapp-testing
      - systematic-debugging
      - planning-with-tasks
      - verification-before-completion
    optional_skills: []
    context_files:
      - context-roles/GROUP_Verify.md

  Security:
    group: Verify
    role_file: context-roles/GROUP_Verify.md
    required_skills:
      - deep-research
      - verification-before-completion
    optional_skills: []
    context_files:
      - context-roles/GROUP_Verify.md

  DevOps:
    group: Verify
    role_file: context-roles/GROUP_Verify.md
    required_skills:
      - systematic-debugging
      - verification-before-completion
    optional_skills: []
    context_files:
      - context-roles/GROUP_Verify.md

  Review:
    group: null   # 跨階段角色
    role_file: context-roles/ROLE_Review.md
    required_skills:
      - gate-check
      - cia
      - verification-before-completion
    optional_skills:
      - retro
    context_files:
      - context-roles/ROLE_Review.md

# ---- Tier 2 Skills (專案級啟用) ----
tier2_skills:
  - deep-research
  - doc-coauthoring
  - screenshot-to-code
  - validate-contract
  - ground
  - retro
  - external-integration            # 異質系統串接時由 GROUP_Build 強制觸發
  - self-healing-build              # v4.1: Build Agent 自動載入
  - pattern-library                 # v4.1: Build Agent 自動載入
  - concurrent-build                # v4.1: Specialist 並行時載入
  # Domain skill 自動從 domain.skill_path 載入，不需列在此

# ---- Self-Healing Build ----
self_healing:
  max_attempts: 3                    # 最多嘗試次數（不可超過 3）
  attempt1_timeout_sec: 120          # Quick Fix 上限
  attempt2_timeout_sec: 300          # Root Cause Analysis 上限
  attempt3_timeout_sec: 300          # Alternative Strategy 上限
  auto_freeze_on_escalate: true      # 升級時自動啟用 Freeze Mode
  log_file: "healing-log.md"         # 自癒記錄檔
  pattern_feedback: true             # 成功修復自動回饋 pattern library

# ---- Gate 分級策略 ----
gate_policy:
  enabled: true

  # L1 Auto-Pass 條件（全部滿足才 Auto-Pass）
  auto_pass:
    tests_green: true
    drift_signals: 0
    max_diff_lines: 200
    no_arch_change: true
    no_shared_component: true
    no_external_integration: true
    no_compliance_change: true

  # 強制 Full-Gate（永遠 L3）
  force_full_gate:
    - "gate-1"              # 需求 Gate
    - "gate-2"              # 架構 Gate
    - "first_deployment"    # 首次部署
    - "compliance_change"   # 合規變更

  # 安全閥
  auto_pass_streak_limit: 5   # 連續 Auto-Pass 超過此數強制升級 L2

# ---- Concurrency（v4.1）----
concurrency:
  max_parallel_features: 3           # 同時 Build 的 Feature 上限
  max_specialists_per_feature: 2     # 每個 Feature 的 specialist worktree 上限（BE + FE）
  cross_feature_integration_interval: 3  # 每 N 個 Feature merge 後強制整合測試
  coordination_dir: ".coordination"  # 協調目錄
  signal_bus_format: "jsonl"         # signal 格式

# ---- Execution Modes ----
modes:
  execution: "copilot"       # autopilot / copilot / manual
  gate_weight: "standard"    # standard / lite

# ---- Token Budgets ----
token_budgets:
  CLAUDE.md: 5000
  task-master_SKILL: 2000
  GROUP_Discovery: 2000
  GROUP_Build: 2000
  GROUP_Verify: 2000
  ROLE_Review: 1000
  STATE.md: 400
  LEARNINGS.md: 800
